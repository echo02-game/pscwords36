    <style>
        /* CSS 變量與全局設定 */
        :root {
            --color-light: #91C6BC;
            --color-main: #4B9DA9;
            --color-bg: #FFFFFF;
            --color-accent: #E37434;
            --font-yuanti: "Yuanti SC", "YouYuan", "STYuanti", "Microsoft YaHei", sans-serif;

        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-yuanti);
            background-color: var(--color-bg);
            color: #333;
            min-height: 100vh;
            min-height: 100svh; 
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            
            -webkit-user-select: none;
            user-select: none; 
        }

        input, textarea {
            -webkit-user-select: auto;
            user-select: auto;
        }

        /* 頂部標題與計數器 */
        header {
            padding: env(safe-area-inset-top, 15px) 20px 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            z-index: 10;
        }

        .title-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
        }

        .title-line1 {
            color: #666666;
            font-size: clamp(0.8rem, 3vw, 1rem);
            font-weight: normal;
        }

        .title-line2 {
            color: #000000;
            font-size: clamp(1.1rem, 4vw, 1.5rem);
            font-weight: bold;
            word-wrap: break-word;
        }

        .title-hint {
            color: #888888;
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            font-weight: normal;
            margin-top: 2px;
        }

        .counter {
            color: var(--color-main);
            font-size: clamp(1rem, 4vw, 1.2rem);
            font-weight: bold;
            white-space: nowrap;
            margin-left: 10px;
        }

        /* 視圖切換管理 */
        .view {
            display: none;
            flex: 1;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 10px 20px 20px 20px;
        }

        .view.active {
            display: flex;
        }

        /* 登入視圖 */
        #login-view {
            gap: 20px;
            max-width: 400px;
            margin: 0 auto;
        }

        #login-view h2 {
            color: #000000;
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .project-info {
            text-align: center;
            margin-bottom: 10px;
        }

        .project-info h3 {
            color: var(--color-main);
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 5px;
        }

        .input-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid var(--color-light);
            border-radius: 10px;
            font-family: var(--font-yuanti);
            outline: none;
        }

        input:focus {
            border-color: var(--color-main);
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: var(--font-yuanti);
            background-color: var(--color-main);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            -webkit-tap-highlight-color: transparent;
        }
        
        button:active {
            transform: scale(0.98);
        }

        .error-msg {
            color: var(--color-accent);
            font-size: 1rem;
            min-height: 1.5em;
        }

        /* 詞卡視圖 */
        #card-view {
            justify-content: flex-start;
        }

        .card-container {
            perspective: 1000px;
            width: 85vw;
            max-width: 500px;
            aspect-ratio: 4/3;
            margin: 5vh auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            border-radius: 20px;
            -webkit-tap-highlight-color: transparent;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: white;
            border-radius: 20px;
            border: 4px solid var(--color-light);
            padding: 20px;
        }

        .card-back {
            transform: rotateY(180deg);
            border-color: var(--color-main);
        }

        .hanzi {
            font-size: clamp(40px, 11vw, 75px);
            color: #333;
            font-weight: bold;
        }

        .pinyin {
            font-family: var(--font-pinyin);
            font-size: clamp(22px, 6vw, 36px);
            color: var(--color-accent);
            margin-bottom: 5px;
        }

        .controls {
            display: flex;
            gap: 15px;
            width: 85vw;
            max-width: 500px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .controls button {
            flex: 1;
            padding: 12px 0;
            font-size: clamp(1rem, 4vw, 1.2rem);
        }

        /* 結算視圖 */
        #finish-view {
            overflow-y: auto;
            justify-content: flex-start;
            padding-bottom: 80px;
        }

        #finish-view h2 {
            color: #4B9DA9;
            font-size: clamp(1.5rem, 5vw, 2rem);
            margin-bottom: 20px;
            text-align: center;
        }

        .finish-controls {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .finish-controls button {
            flex: 1;
            padding: 12px 0;
            font-size: clamp(1rem, 4vw, 1.2rem);
        }

        #restart-btn {
            background-color: #91C6BC;
        }

        #restart-btn:hover {
            background-color: var(--color-main);
        }

        #home-btn {
            background-color: var(--color-accent);
        }

        #home-btn:hover {
            opacity: 0.9;
        }

        .word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-width: 800px;
            margin-bottom: 20px;
        }

        .word-item {
            background-color: white;
            padding: 8px 15px;
            border-radius: 8px;
            border: 2px solid var(--color-light);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
        }

        /* 結算頁面：點擊播放時的變色效果 */
        .word-item.playing {
            background-color: var(--color-light);
            border-color: var(--color-main);
        }
        
        .word-item.playing .hanzi, 
        .word-item.playing .pinyin {
            color: white;
        }

        .word-item .pinyin {
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .word-item .hanzi {
            font-size: 1.2rem;
        }

        /* 底部版權宣告 */
        footer {
            width: 100%;
            padding: 15px;
            padding-bottom: env(safe-area-inset-bottom, 15px);
            font-size: 0.7rem;
            color: #999;
            text-align: center;
            background-color: var(--color-bg);
            margin-top: auto;
        }

        #dev-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            opacity: 0.3;
            cursor: pointer;
            display: none;
            z-index: 100;
        }

        #dev-panel {
            display: none;
            position: absolute;
            top: 60px;
            left: 20px;
            background: rgba(255,255,255,0.95);
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            z-index: 99;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #dev-panel textarea {
            width: 300px;
            height: 200px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 0.8rem;
        }
    </style>
</head>

            <h3>【作品36號】難點字詞練習詞卡</h3>
        </div>

        </div>
        <div class="error-msg" id="login-error"></div>
        <button id="login-btn">進入</button>
    </div>

    <div id="card-view" class="view">

            <textarea id="dev-output" readonly></textarea>

        <div class="card-container">

                    <div class="pinyin" id="back-pinyin"></div>
                    <div class="hanzi" id="back-hanzi"></div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button id="prev-btn">上一個</button>
            <button id="next-btn">下一個</button>
        </div>
    </div>

    <div id="finish-view" class="view">
        <h2>恭喜完成練習，讀得真不錯！</h2>
        <div class="finish-controls">
            <button id="restart-btn">再來一遍</button>
            <button id="home-btn">回主目錄</button>
        </div>
        <div class="word-list" id="word-list"></div>
    </div>

        // === 登入邏輯 ===
        function attemptLogin() {
            const inputVal = passwordInput.value.trim().toLowerCase();
            if (inputVal === 'vtcpsc') {
                if (usernameInput.value.trim() === '') {
                    loginError.textContent = '請輸入姓名';
                    return;
                }
                loginError.textContent = '';
                loginView.classList.remove('active');
                cardView.classList.add('active');
                mainHeader.style.display = 'flex';
                updateCard();
            } else {
                loginError.textContent = '請輸入正確密碼';
            }
        }

        loginBtn.addEventListener('click', attemptLogin);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') attemptLogin();
        });
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') passwordInput.focus();
        });

        // === 詞卡邏輯 ===
        function updateCard() {
            flashcard.style.transition = 'none';
            flashcard.classList.remove('is-flipped');
            isFlipped = false;
            
            void flashcard.offsetWidth;
            
            flashcard.style.transition = 'transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1)';

            const data = sentenceData[currentIndex];
            frontHanzi.textContent = data.word;
            backHanzi.textContent = data.word;
            backPinyin.textContent = data.pinyin;
            counter.textContent = `${currentIndex + 1}/${sentenceData.length}`;
            
            prevBtn.disabled = currentIndex === 0;
            prevBtn.style.opacity = currentIndex === 0 ? '0.5' : '1';
        }

        function playAudioSnippet(start, end, onEndCallback = null) {
            clearTimeout(playTimeout);
            audioPlayer.currentTime = start;
            audioPlayer.play().catch(e => console.log("等待用戶交互以播放音頻", e));
            
            const duration = (end - start) * 1000;
            playTimeout = setTimeout(() => {
                audioPlayer.pause();
                if (onEndCallback) onEndCallback();
            }, duration);
        }

        flashcard.addEventListener('click', () => {
            isFlipped = true;
            flashcard.classList.add('is-flipped');
            const data = sentenceData[currentIndex];
            playAudioSnippet(data.start, data.end);
        });

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < sentenceData.length - 1) {
                currentIndex++;
                updateCard();
            } else {
                showFinishView();
            }
        });

        // === 結算視圖邏輯 ===
        function showFinishView() {
            cardView.classList.remove('active');
            finishView.classList.add('active');
            mainHeader.style.display = 'none';
            
            wordList.innerHTML = '';
            sentenceData.forEach((item) => {
                const el = document.createElement('div');
                el.className = 'word-item';
                el.innerHTML = `<div class="pinyin">${item.pinyin}</div><div class="hanzi">${item.word}</div>`;
                
                el.addEventListener('click', () => {
                    if (activeWordElement) {
                        activeWordElement.classList.remove('playing');
                    }
                    
                    el.classList.add('playing');
                    activeWordElement = el;
                    
                    playAudioSnippet(item.start, item.end, () => {
                        el.classList.remove('playing');
                        activeWordElement = null;
                    });
                });
                
                wordList.appendChild(el);
            });
        }

        restartBtn.addEventListener('click', () => {
            currentIndex = 0;
            finishView.classList.remove('active');
            cardView.classList.add('active');
            mainHeader.style.display = 'flex';
            updateCard();
        });

        homeBtn.addEventListener('click', () => {
            window.location.href = 'https://echo02-game.github.io/pscwordshub/';
        });

        // === 開發者模式邏輯 ===
        const devToggle = document.getElementById('dev-toggle');
        const devPanel = document.getElementById('dev-panel');
        const devStartBtn = document.getElementById('dev-start-btn');
        const devMarkBtn = document.getElementById('dev-mark-btn');
        const devStatus = document.getElementById('dev-status');
        const devOutput = document.getElementById('dev-output');
        
        let isDevMode = false;
        let isRecording = false;
        let devData = [];
        let currentRecordIndex = 0;
        let lastMarkTime = 0;

        // 設備檢測邏輯：透過 userAgent 判斷是否為行動裝置
        const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        // 僅在非行動裝置（即電腦）顯示開發者工具按鈕
        if (!isMobileDevice) {
            devToggle.style.display = 'block';
        }

        devToggle.addEventListener('click', () => {
            isDevMode = !isDevMode;
            devPanel.style.display = isDevMode ? 'block' : 'none';
        });

        devStartBtn.addEventListener('click', () => {
            isRecording = true;
            devData = JSON.parse(JSON.stringify(sentenceData));
            currentRecordIndex = 0;
            lastMarkTime = 0;
            devOutput.value = '';
            devMarkBtn.disabled = false;
            
            currentIndex = 0;
            updateCard();
            
            devStatus.textContent = `錄製中: 第 ${currentRecordIndex + 1} 個詞 (${devData[currentRecordIndex].word})`;
            
            clearTimeout(playTimeout);
            audioPlayer.currentTime = 0;
            audioPlayer.play();
        });

        function markTime() {
            if (!isRecording) return;
            
            const currentTime = audioPlayer.currentTime;
            devData[currentRecordIndex].start = lastMarkTime;
            devData[currentRecordIndex].end = currentTime;
            lastMarkTime = currentTime;
            
            currentRecordIndex++;
            
            if (currentRecordIndex < devData.length) {
                devStatus.textContent = `錄製中: 第 ${currentRecordIndex + 1} 個詞 (${devData[currentRecordIndex].word})`;
                currentIndex = currentRecordIndex;
                updateCard();
            } else {
                audioPlayer.pause();
                isRecording = false;
                devMarkBtn.disabled = true;
                devStatus.textContent = "錄製完成！";
                devOutput.value = "let sentenceData = " + JSON.stringify(devData, null, 4) + ";";
            }
        }

        devMarkBtn.addEventListener('click', markTime);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && isRecording) {
                e.preventDefault();
                markTime();
            }
        });
    </script>
</body>
</html>
